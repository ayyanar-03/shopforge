global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ['gateway:3000']

  - job_name: catalog-service
    static_configs:
      - targets: ['catalog-service:3001']

  - job_name: order-service
    static_configs:
      - targets: ['order-service:3002']

  - job_name: notification-service
    static_configs:
      - targets: ['notification-service:3003']
