version: "3.8"

x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318

x-db-env: &db-env
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_USER: shopforge_user
  DB_PASSWORD: shopforge_pass
  DB_NAME: shopforge
  DB_SSL: "false"

x-redis-env: &redis-env
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ""
  REDIS_TLS: "false"

x-jwt-env: &jwt-env
  JWT_SECRET: ${JWT_SECRET:-shopforge_secret}
  INTERNAL_TOKEN: ${INTERNAL_TOKEN:-shopforge_internal}

services:
  # ── Infrastructure ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: shopforge-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: shopforge
      POSTGRES_USER: shopforge_user
      POSTGRES_PASSWORD: shopforge_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopforge_user -d shopforge"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: shopforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application services ────────────────────────────────────────────────────
  catalog-service:
    build:
      context: ./services/catalog-service
      dockerfile: Dockerfile
    container_name: shopforge-catalog
    restart: unless-stopped
    environment:
      <<: [*db-env, *redis-env, *jwt-env, *otel-env]
      PORT: "3001"
      NODE_ENV: production
      ORDER_SERVICE_URL: http://order-service:3002
      OTEL_SERVICE_NAME: catalog-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: shopforge-orders
    restart: unless-stopped
    environment:
      <<: [*db-env, *redis-env, *jwt-env, *otel-env]
      PORT: "3002"
      NODE_ENV: production
      CATALOG_SERVICE_URL: http://catalog-service:3001
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      OTEL_SERVICE_NAME: order-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: shopforge-notifications
    restart: unless-stopped
    environment:
      <<: [*redis-env, *otel-env]
      PORT: "3003"
      NODE_ENV: production
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      OTEL_SERVICE_NAME: notification-service
    depends_on:
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: shopforge-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      <<: *otel-env
      PORT: "3000"
      NODE_ENV: production
      CATALOG_SERVICE_URL: http://catalog-service:3001
      ORDER_SERVICE_URL: http://order-service:3002
      CORS_ORIGIN: http://localhost:5173
      OTEL_SERVICE_NAME: gateway
    depends_on:
      catalog-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shopforge-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
      VITE_CURRENCY_RATE: ${VITE_CURRENCY_RATE:-83.5}
    ports:
      - "5173:80"
    depends_on:
      gateway:
        condition: service_healthy

  # ── Observability ──────────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: shopforge-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"  # Jaeger UI
      - "4318:4318"    # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: shopforge-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:10.4.2
    container_name: shopforge-grafana
    restart: unless-stopped
    ports:
      - "4000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-shopforge}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  # ── TLS (production only) ──────────────────────────────────────────────────
  caddy:
    profiles: [production]
    image: caddy:2-alpine
    container_name: shopforge-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - gateway

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  caddy_data:
  caddy_config:
